name: F-Droid Release

# Unsigned release APK + Fastlane metadata for F-Droid packaging.
# No repository secrets required.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fdroid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/android/**/*.gradle*', 'apps/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        working-directory: apps
        run: flutter pub get

      - name: Generate code
        working-directory: apps
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build unsigned F-Droid APK
        working-directory: apps/android
        run: ./gradlew :app:assembleRelease -Psyncwave.fdroid=true --no-daemon

      - name: Upload F-Droid artifact
        uses: actions/upload-artifact@v4
        with:
          name: syncwave-fdroid-${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 30
          path: |
            apps/build/app/outputs/flutter-apk/app-release.apk
            apps/build/app/outputs/apk/release/*.apk
            fastlane/metadata/android/en-US/**
